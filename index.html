<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZTM Planer</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }
    button {
      background: #00c853;
      color: white;
      font-size: 16px;
    }
    #result {
      margin-top: 20px;
      white-space: pre-line;
    }
    .suggestion {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }
    .suggestion:hover {
      background: #333;
    }
  </style>
</head>
<body>

<h2>🚍 ZTM Planer</h2>

<input id="start" placeholder="Przystanek startowy" oninput="showSuggestions(this.value, 'start')">
<div id="startSuggestions"></div>

<input id="end" placeholder="Przystanek końcowy" oninput="showSuggestions(this.value, 'end')">
<div id="endSuggestions"></div>

<input id="ride" placeholder="Czas jazdy (min)">
<input id="transfer" placeholder="Czas przesiadki (min)">
<input id="total" placeholder="Łączny czas pracy (min)">

<button onclick="plan()">GENERUJ TRASĘ</button>

<div id="result"></div>

<script>
let stops = [];

// pobierz przystanki z backendu
fetch("https://ztm-backend-vg5c.onrender.com/stops")
  .then(res => res.json())
  .then(data => stops = data);

// autocomplete
function showSuggestions(value, type) {
  const box = document.getElementById(type + "Suggestions");
  box.innerHTML = "";

  if (!value) return;

  const filtered = stops.filter(s =>
    s.toLowerCase().includes(value.toLowerCase())
  ).slice(0, 6);

  filtered.forEach(s => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerText = s;
    div.onclick = () => {
      document.getElementById(type).value = s;
      box.innerHTML = "";
    };
    box.appendChild(div);
  });
}

// planowanie
async function plan() {

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const ride = document.getElementById("ride").value;
  const transfer = document.getElementById("transfer").value;
  const total = document.getElementById("total").value;

  if (!start || !end || !ride || !transfer || !total) {
    document.getElementById("result").innerText =
      "❌ Uzupełnij wszystkie pola!";
    return;
  }

  try {
    const res = await fetch("https://ztm-backend-vg5c.onrender.com/plan", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        start,
        end,
        ride_time: +ride,
        transfer_time: +transfer,
        total_time: +total
      })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      data.route.join("\n") + "\n\n⏱ " + data.total_time + " min";

  } catch (err) {
    document.getElementById("result").innerText =
      "❌ Błąd połączenia z serwerem";
  }
}
</script>

</body>
</html>
