<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTM Planer</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

button {
  background: #00c853;
  color: white;
}

.suggestion {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

.suggestion:hover {
  background: #333;
}
</style>
</head>

<body>

<h2>🚍 ZTM Planer</h2>

<input id="start" placeholder="Start" oninput="showSuggestions(this.value, 'start')">
<div id="startSuggestions"></div>

<input id="end" placeholder="Koniec" oninput="showSuggestions(this.value, 'end')">
<div id="endSuggestions"></div>

<input id="startTime" type="time">
<input id="endTime" type="time">

<input id="transfer" placeholder="Czas przesiadki (min)">

<button onclick="plan()">GENERUJ</button>

<div id="result"></div>

<script>
let stops = [];

fetch("https://ztm-backend.vercel.app/stops")
  .then(res => res.json())
  .then(data => stops = data);

function showSuggestions(value, type) {
  const box = document.getElementById(type + "Suggestions");
  box.innerHTML = "";

  if (!value) return;

  const filtered = stops
    .filter(s => s.toLowerCase().includes(value.toLowerCase()))
    .slice(0, 8);

  filtered.forEach(s => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.innerText = s;

    div.onclick = () => {
      document.getElementById(type).value = s;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
}

async function plan() {

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;
  const startTime = document.getElementById("startTime").value;
  const endTime = document.getElementById("endTime").value;
  const transfer = document.getElementById("transfer").value;

  if (!start || !end || !startTime || !endTime || !transfer) {
    document.getElementById("result").innerText = "❌ Uzupełnij wszystkie pola";
    return;
  }

  const startMin = toMinutes(startTime);
  const endMin = toMinutes(endTime);

  const total = endMin - startMin;

  try {
    const res = await fetch("https://ztm-backend.vercel.app/plan", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        start,
        end,
        ride_time: 0,
        transfer_time: +transfer,
        total_time: total,
        start_time: startMin
      })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      data.route.join("\n") + "\n\n⏱ " + total + " min";

  } catch {
    document.getElementById("result").innerText = "❌ Błąd serwera";
  }
}

function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h*60 + m;
}
</script>

</body>
</html>
